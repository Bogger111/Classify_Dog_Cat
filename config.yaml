dataset:
  train_dir: "data/train"
  val_dir: null
  batch_size: 16
  num_workers: 2
  use_preprocessed: false
  preprocessed_dir: "data/preprocessed"
  tensor_num_workers: 0

model:
  num_classes: 2
  dropout: 0.3

optimizer:
  type: "Adam"
  lr: 0.001
  weight_decay: 0.0001

criterion:
  type: "CrossEntropyLoss"

scheduler:
  type: "StepLR"
  step_size: 20
  gamma: 0.8

train:
  epochs: 50
  seed: 42
  amp: true
  cudnn_benchmark: true
  resume_path: null

checkpoint_dir: "./checkpoints"
